name: Nightly checks

# Periodic non-regression and security checks, deliberately OUTSIDE the CI
# pipeline (not needed on every PR). The nightly catches what *time* introduces:
# new CVEs in dependencies and base images.
on:
  schedule:
    - cron: '0 3 * * *' # every day at 03:00 UTC
  workflow_dispatch: {} # manual trigger

jobs:
  tests:
    name: Full test suite (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [server, client]
    defaults:
      run:
        working-directory: ./${{ matrix.project }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        if: matrix.project == 'server'
        run: npx prisma generate
      - name: Test with coverage
        run: npm run test:coverage

  audit:
    name: Dependency audit (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [server, client]
    defaults:
      run:
        working-directory: ./${{ matrix.project }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      - name: Install dependencies
        run: npm ci
      # Gate: fail if PRODUCTION dependencies (what ships) have a high/critical
      # vulnerability.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      # Informational: surface dev vulnerabilities (CI/tooling) without failing
      # the run (they are not shipped).
      - name: Audit all dependencies (informational)
        run: npm audit
        continue-on-error: true

  image-scan:
    name: Trivy image scan (${{ matrix.service }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # required to publish the SARIF to the Security tab
    strategy:
      fail-fast: false
      matrix:
        service: [server, client]
    steps:
      - uses: actions/checkout@v5
      - name: Build image
        run: docker build -t orion-${{ matrix.service }}:nightly ./${{ matrix.service }}
      # Report-only (exit-code 0): base-image OS package CVEs are upstream and
      # outside our control, so we MONITOR them (rebuild policy) rather than gate
      # the nightly on them. Our own dependencies ARE gated, in the `audit` job above.
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: orion-${{ matrix.service }}:nightly
          format: 'sarif'
          output: 'trivy-${{ matrix.service }}.sarif'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          exit-code: '0'
          # Disabled: the two matrix legs run in parallel and would race to save
          # the Trivy DB under the same cache key (noisy "cache save" warnings).
          # Re-downloading the DB each night is negligible.
          cache: 'false'
      # Publish results to the Security tab (free for public repositories).
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-${{ matrix.service }}.sarif'
          category: 'trivy-${{ matrix.service }}'
