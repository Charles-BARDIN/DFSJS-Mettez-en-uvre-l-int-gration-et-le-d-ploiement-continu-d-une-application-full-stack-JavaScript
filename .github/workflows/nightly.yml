name: Nightly checks

# Vérifications périodiques de non-régression et de sécurité, volontairement HORS
# du pipeline CI (pas nécessaires à chaque PR). Le nightly détecte ce que le *temps*
# introduit : nouvelles CVE des dépendances et des images de base.
on:
  schedule:
    - cron: '0 3 * * *' # tous les jours à 03:00 UTC
  workflow_dispatch: {} # déclenchement manuel possible

jobs:
  tests:
    name: Full test suite (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [server, client]
    defaults:
      run:
        working-directory: ./${{ matrix.project }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        if: matrix.project == 'server'
        run: npx prisma generate
      - name: Test with coverage
        run: npm run test:coverage

  audit:
    name: Dependency audit (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [server, client]
    defaults:
      run:
        working-directory: ./${{ matrix.project }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      - name: Install dependencies
        run: npm ci
      # Gate: échoue si les dépendances de PRODUCTION (ce qui est livré) ont une
      # vulnérabilité high/critical.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      # Informatif : remonte les vulnérabilités dev (CI/outils) sans faire échouer
      # le run (elles ne sont pas livrées).
      - name: Audit all dependencies (informational)
        run: npm audit
        continue-on-error: true

  image-scan:
    name: Trivy image scan (${{ matrix.service }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # nécessaire pour publier le SARIF dans l'onglet Security
    strategy:
      fail-fast: false
      matrix:
        service: [server, client]
    steps:
      - uses: actions/checkout@v5
      - name: Build image
        run: docker build -t orion-${{ matrix.service }}:nightly ./${{ matrix.service }}
      # Report-only (exit-code 0) : les CVE des paquets OS de l'image de base sont
      # en amont et hors de notre contrôle → on les MONITORE (politique de rebuild)
      # plutôt que de gater le nightly dessus. Nos propres dépendances, elles, sont
      # gatées dans le job `audit` ci-dessus.
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: orion-${{ matrix.service }}:nightly
          format: 'sarif'
          output: 'trivy-${{ matrix.service }}.sarif'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          exit-code: '0'
          # Disabled: the two matrix legs run in parallel and would race to save
          # the Trivy DB under the same cache key (noisy "cache save" warnings).
          # Re-downloading the DB each night is negligible.
          cache: 'false'
      # Publie les résultats dans l'onglet Security (repo public → gratuit).
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-${{ matrix.service }}.sarif'
          category: 'trivy-${{ matrix.service }}'
