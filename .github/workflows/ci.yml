name: CI

# Flux par pull request : on valide chaque PR vers main, et l'état de main après
# merge. Pas de `push` sur toutes les branches (évite les exécutions en double).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annule un run obsolète si un nouveau commit arrive sur la même réf.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Back-end (lint, build, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: server/coverage/lcov.info
          if-no-files-found: error

  frontend:
    name: Front-end (lint, typecheck, build, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: client/coverage/lcov.info
          if-no-files-found: error

      # Build last: no point producing the bundle if types or tests fail.
      - name: Build
        run: npm run build
