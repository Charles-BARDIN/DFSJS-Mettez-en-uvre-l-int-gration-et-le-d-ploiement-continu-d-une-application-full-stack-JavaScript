sonar.projectKey=Charles-BARDIN_DFSJS-Mettez-en-uvre-l-int-gration-et-le-d-ploiement-continu-d-une-application-full-stack-JavaScript
sonar.organization=charles-bardin

# Sources analysées (monorepo : back-end + front-end)
sonar.sources=server/src,client/src

# Fichiers de test (exclus des sources, comptés comme tests)
sonar.tests=server/src,client/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Rapports de couverture (lcov) produits par Vitest
sonar.javascript.lcov.reportPaths=server/coverage/lcov.info,client/coverage/lcov.info

# Exclus du calcul de couverture : bootstrap, configs, types générés, schéma,
# logger et middleware (code d'infrastructure sans logique métier à tester)
sonar.coverage.exclusions=**/*.config.ts,**/*.config.js,client/src/main.tsx,client/src/vite-env.d.ts,server/prisma/**,server/src/index.ts,server/src/logger.ts,server/src/middleware/**

# Make the CI job wait for the Quality Gate verdict and fail if it is not
# met. Combined with branch protection (required "SonarCloud Code Analysis"
# check), this turns the Quality Gate into a real merge blocker.
sonar.qualitygate.wait=true

sonar.sourceEncoding=UTF-8
