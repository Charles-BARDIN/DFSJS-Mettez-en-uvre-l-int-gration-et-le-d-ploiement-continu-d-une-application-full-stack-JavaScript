# Minimal Logstash pipeline: receive Filebeat events, parse the JSON log line,
# drop health-check noise as a safety net, and index into Elasticsearch.

input {
  beats {
    port => 5044
  }
}

filter {
  # Both tiers emit a JSON object as the log line. Parse it into top-level
  # fields (level, message, tier, method, path, status, durationMs, ...).
  # skip_on_invalid_json avoids _jsonparsefailure tags on any stray plain line.
  json {
    source => "message"
    skip_on_invalid_json => true
  }

  # Drop non-application noise: every real Orion log line is JSON carrying a
  # "tier" field, so anything without one (e.g. npm start-up notices on stdout)
  # is not a log we want to centralize.
  if ![tier] {
    drop {}
  }

  # Health-checks are already excluded at the source (backend skips /api/health,
  # Nginx does not log /healthz). This is a defensive net in case that changes.
  if [path] in ["/api/health", "/healthz"] {
    drop {}
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    # One daily index; the Kibana data view is "orion-logs-*".
    index => "orion-logs-%{+YYYY.MM.dd}"
  }
}
