# JSON access-log format (http context), so the frontend tier emits structured
# logs just like the backend (Winston). Filebeat/Logstash ingest them as-is.
# escape=json keeps the output valid JSON even when a field contains quotes.
log_format orion_json escape=json '{'
    '"@timestamp":"$time_iso8601",'
    '"tier":"frontend",'
    '"remote_addr":"$remote_addr",'
    '"method":"$request_method",'
    '"path":"$uri",'
    '"request":"$request",'
    '"status":$status,'
    '"body_bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"http_referer":"$http_referer",'
    '"http_user_agent":"$http_user_agent"'
  '}';

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Emit access logs as JSON on stdout (Docker captures it -> ELK).
    access_log /dev/stdout orion_json;

    # Container health-check endpoint. Serves the SPA shell (so the check can
    # still assert id="root" is present) but is NOT logged, to keep the ~10s
    # health-check beat out of the dashboards. This is the frontend counterpart
    # of the backend skipping /api/health in its request logger.
    location = /healthz {
        access_log off;
        try_files /index.html =404;
    }

    # Single Page Application: let client-side routing handle unknown paths
    # by always falling back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to the backend container.
    #
    # Why a variable ($backend) + resolver, instead of `proxy_pass http://server:8080;`?
    #   - With a LITERAL host, Nginx resolves "server" only ONCE at startup and
    #     caches that IP for the whole process life: it would refuse to start if
    #     the backend isn't up yet, and keep hitting a stale IP if the backend
    #     restarts with a new one.
    #   - With the host in a VARIABLE, Nginx resolves per request (using the
    #     `resolver`), so it starts without the backend and follows IP changes.
    #     127.0.0.11 is Docker's embedded DNS; `valid=10s` re-resolves every 10s.
    #
    # Why "$request_uri"? When proxy_pass contains a variable, Nginx does NOT
    # auto-append the matched path, so we re-attach the full original URI
    # (path + query string) to preserve the "/api/..." prefix the backend expects.
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $backend http://server:8080;
        proxy_pass $backend$request_uri;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
