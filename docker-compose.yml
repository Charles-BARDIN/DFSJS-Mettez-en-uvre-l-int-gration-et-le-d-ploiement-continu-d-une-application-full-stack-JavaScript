# Orchestration of the Orion CRM stack (backend API + frontend SPA).
# Run locally with:  docker compose up --build
#   - Frontend (Nginx) -> http://localhost:4200
#   - Backend  (API)   -> http://localhost:8080/api/health

services:
  server:
    build: ./server
    image: orion-crm-server
    environment:
      NODE_ENV: production
      PORT: "8080"
      # SQLite database stored on the named volume (persists across restarts)
      DATABASE_URL: file:/app/data/prod.db
    volumes:
      - db-data:/app/data
    ports:
      - "8080:8080"
    healthcheck:
      # node is available in the image; avoids depending on curl/wget
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:8080/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  client:
    build: ./client
    image: orion-crm-client
    depends_on:
      server:
        condition: service_healthy
    ports:
      # host 4200 (familiar dev port) -> container Nginx on 8080
      - "4200:8080"
    healthcheck:
      # Not just a 200 (the SPA fallback returns 200 for anything): assert the
      # built app shell is actually served.
      # Unlike the backend, the Nginx image has no Node runtime, so we use
      # wget | grep. The pipe is a shell feature, hence CMD-SHELL (not CMD).
      # 127.0.0.1 (not localhost): Nginx listens on IPv4 only; "localhost" may
      # resolve to ::1 (IPv6) inside the container and get refused.
      test:
        - CMD-SHELL
        - wget -q -O - http://127.0.0.1:8080/ | grep -q 'id="root"'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  db-data: